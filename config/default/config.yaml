# =========================================
# B站点歌插件 - 服务端配置模板
# 申请地址: https://open-live.bilibili.com/open-manage
# =========================================

# 项目密钥 ID (直播创作者服务中心 -> 个人资料 页面获取)
access_key_id: ""

# 项目密钥 Secret (与 access_key_id 配对)
access_key_secret: ""

# 项目 AppId (直播创作者服务中心 -> 我的项目 -> 创建项目后获取)
bili_app_id: 0

# 服务监听地址 (0.0.0.0 允许所有网络访问, 127.0.0.1 仅本地)
web_server_host: "127.0.0.1"

# 服务端口号
web_server_port: 17777
