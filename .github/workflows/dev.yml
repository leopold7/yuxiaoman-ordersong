name: Dev Build (prerelease)

# 仅针对 dev 分支：推送后自动打包一个 Windows exe，并发布为「最新」预发布（prerelease）。
# 每次构建都会清理上一份 dev 预发布，保证只保留最新的一份，供用户下载。
on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

# 同一时间只跑一个 dev 构建；新推送会取消进行中的旧构建（清理步骤在最后才执行，所以取消不会导致空窗）。
concurrency:
  group: dev-build
  cancel-in-progress: true

jobs:
  build-dev-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev # dev-only workflow：固定拉取 dev 分支，手动触发(workflow_dispatch)也不会误用默认分支(master)
          fetch-depth: 0 # 需要完整历史以生成提交对比

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-tauri/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop-tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install JS deps
        run: pnpm install --no-frozen-lockfile

      # tauri-build 需要 icons/icon.ico（被 .gitignore 忽略，这里从 logo.png 重新生成）
      - name: Generate icon
        run: node desktop-tauri/scripts/gen-icon.mjs

      # installer 脚本会依次执行 sync-version / clean-acl-cache / bundle-backend / tauri build，
      # 其中 tauri build 的 beforeBuildCommand 会自动构建前端。
      - name: Build x64 installer
        run: pnpm --filter ordersong-desktop installer

      # CI（非中文代码页）下中文 productName 会被 NSIS 丢弃，直接把安装包改名为英文名，不再做检测
      - name: Rename installer to English name
        shell: bash
        run: |
          node -e "const fs=require('fs'),path=require('path');const dir='desktop-tauri/src-tauri/target/release/bundle/nsis';const f=fs.readdirSync(dir).find(x=>x.toLowerCase().endsWith('.exe'));if(f){const nf='yuxiaoman-ordersong_dev_x64-setup.exe';fs.renameSync(path.join(dir,f),path.join(dir,nf));console.log('已重命名为 '+nf);}else{console.log('未找到 exe');}"

      # 清理上一份 dev 预发布及其 tag（gh release delete 默认同时删除 tag）
      - name: Remove previous dev prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="dev-latest"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" -y
            echo "::notice::已删除旧的 dev 预发布 $TAG"
          else
            echo "::notice::未找到旧 dev 预发布，直接创建"
          fi
          # 兜底：删除远程 tag
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          # 删除本地残留 tag，否则 gh release create 会因「本地存在但未推送」而报错
          git tag -d "$TAG" 2>/dev/null || true

      # 发布新的 dev 预发布（固定 tag dev-latest，只保留最新一份）
      - name: Publish dev prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="dev-latest"
          EXE=$(ls desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe | head -n1)
          REPO="${{ github.repository }}"
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"

          {
            echo "## Dev 预发布版 (dev-latest)"
            echo
            echo "> 此预发布由 \`dev\` 分支自动构建，**仅保留最新的一份**，旧版本会被自动清理。"
            echo
            echo "**Commit:** [\`$SHORT\`](https://github.com/$REPO/commit/${{ github.sha }})"
            echo "**构建时间:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo
            echo "### 最近提交"
            echo
            git log -n 10 --no-merges --pretty=format:"- [\`%h\`](https://github.com/$REPO/commit/%H) %s — _%an_"
            echo
          } > dev-notes.md

          gh release create "$TAG" "$EXE" \
            --title "Dev Prerelease ($SHORT)" \
            --notes-file dev-notes.md \
            --target HEAD \
            --prerelease
