name: Release

# 自动打包 x64 exe 并发布到 GitHub Release.
# - 版本号取自仓库根 package.json 的 version, tag 为 v<version>
# - 若同版本 release 已存在, 则跳过整个构建 (省时省钱)
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build x64 installer & publish release
    runs-on: windows-latest # windows runner 默认产出 x64 exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) 读取根 package.json 的 version 作为 tag / release 名
      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      # 2) 若同版本 release 已存在, 标记 exists=true 以跳过后续构建
      - name: Check if release exists
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release ${{ steps.version.outputs.tag }} already exists, skip build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.check.outputs.exists != 'true'
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Setup Node.js
        if: steps.check.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        if: steps.check.outputs.exists != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: steps.check.outputs.exists != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-tauri/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop-tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install JS deps
        if: steps.check.outputs.exists != 'true'
        run: pnpm install --no-frozen-lockfile

      # 3) 打包 x64 exe: sync-version -> clean-acl-cache -> bundle-backend -> tauri build
      - name: Build x64 installer
        if: steps.check.outputs.exists != 'true'
        run: pnpm --filter ordersong-desktop installer

      # 4) 创建 release 并上传 exe (nsis 输出目录)
      - name: Publish release
        if: steps.check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          EXE=$(ls desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe | head -n1)
          gh release create "${{ steps.version.outputs.tag }}" "$EXE" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "自动构建版本 v${{ steps.version.outputs.version }}"
