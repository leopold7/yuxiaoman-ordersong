name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm --filter ordersong-frontend typecheck

      - name: Build frontend
        run: pnpm --filter ordersong-frontend build

  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-tauri/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop-tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --check --manifest-path desktop-tauri/src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --workspace --manifest-path desktop-tauri/src-tauri/Cargo.toml -- -D warnings

      - name: Check workspace
        run: cargo check --workspace --manifest-path desktop-tauri/src-tauri/Cargo.toml
