name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm --filter ordersong-frontend typecheck

      - name: Build frontend
        run: pnpm --filter ordersong-frontend build

  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-tauri/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop-tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install JS deps
        run: pnpm install --no-frozen-lockfile

      # tauri-build 需要 icons/icon.ico (被 .gitignore 忽略, 这里从 logo.png 重新生成)
      - name: Generate icon
        run: node desktop-tauri/scripts/gen-icon.mjs

      # tauri build.rs 需要 resources/**/* 存在, 由 bundle-backend 生成
      - name: Prepare resources
        run: pnpm --filter ordersong-desktop bundle:res

      - name: Format check
        run: cargo fmt --all --check --manifest-path desktop-tauri/src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --workspace --manifest-path desktop-tauri/src-tauri/Cargo.toml

      - name: Check workspace
        run: cargo check --workspace --manifest-path desktop-tauri/src-tauri/Cargo.toml

  # 仅在 push / 手动触发到 main|master 时跑; 需先通过上面的 CI 校验.
  # 若同版本 release 已存在则跳过构建.
  release:
    needs: [frontend, rust]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需要完整历史以生成提交对比

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release ${{ steps.version.outputs.tag }} already exists, skip build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.check.outputs.exists != 'true'
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Setup Node.js
        if: steps.check.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        if: steps.check.outputs.exists != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: steps.check.outputs.exists != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop-tauri/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop-tauri/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install JS deps
        if: steps.check.outputs.exists != 'true'
        run: pnpm install --no-frozen-lockfile

      # tauri-build 需要 icons/icon.ico (被 .gitignore 忽略, 这里从 logo.png 重新生成)
      - name: Generate icon
        if: steps.check.outputs.exists != 'true'
        run: node desktop-tauri/scripts/gen-icon.mjs

      - name: Build x64 installer
        if: steps.check.outputs.exists != 'true'
        run: pnpm --filter ordersong-desktop installer

      # CI(非中文代码页)下中文 productName 会被 NSIS 丢弃, 直接把安装包改名为英文名, 不再做检测
      - name: Rename installer to English name
        if: steps.check.outputs.exists != 'true'
        shell: bash
        run: |
          node -e "const fs=require('fs'),path=require('path');const dir='desktop-tauri/src-tauri/target/release/bundle/nsis';const f=fs.readdirSync(dir).find(x=>x.toLowerCase().endsWith('.exe'));if(f){const nf='yuxiaoman-ordersong_${{ steps.version.outputs.version }}_x64-setup.exe';fs.renameSync(path.join(dir,f),path.join(dir,nf));console.log('已重命名为 '+nf);}else{console.log('未找到 exe');}"

      - name: Publish release
        if: steps.check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          EXE=$(ls desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe | head -n1)
          REPO="${{ github.repository }}"

          # 取上一个 release 的 tag, 用于与本次做提交对比
          PREV=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            git fetch origin "refs/tags/$PREV:refs/tags/$PREV" 2>/dev/null || true
            RANGE="$PREV..HEAD"
          else
            RANGE="HEAD"
          fi

          {
            echo "## RELEASE v$VERSION"
            echo
            if [ -n "$PREV" ]; then
              echo "> 对比上一版本 \`$PREV\`"
              echo
              echo "完整对比: https://github.com/$REPO/compare/$PREV...$TAG"
              echo
            fi
            echo "### 提交记录"
            echo
            git log "$RANGE" --no-merges --pretty=format:"- [\`%h\`](https://github.com/$REPO/commit/%H) %s — _%an_"
            echo
          } > release-notes.md

          gh release create "$TAG" "$EXE" \
            --title "v$VERSION" \
            --notes-file release-notes.md
